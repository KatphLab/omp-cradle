# yaml-language-server: $schema=./dag.schema.json
swarm:
  name: sample-diamond-dag
  workspace: ../../.worktrees/swarm-sample-dag
  mode: parallel
  target_count: 1
  model: pi/smol
  agents:
    scout:
      role: repository-scout
      task: |
        Smoke test only. In the swarm workspace, create reports/scout.md with
        "scout ok" and signals/scout.txt with exactly OK.
      reports_to: [builder, reviewer]

    builder:
      role: workspace-writer
      task: |
        Smoke test only. In the swarm workspace, read signals/scout.txt, then
        write reports/builder.md with "builder ok" and signals/builder.txt
        with exactly OK.
      waits_for: [scout]
      reports_to: [integrator]

    reviewer:
      role: workspace-reviewer
      task: |
        Smoke test only. In the swarm workspace, read signals/scout.txt, then
        write reports/reviewer.md with "reviewer ok" and signals/reviewer.txt
        with exactly OK.
      waits_for: [scout]
      reports_to: [integrator]

    integrator:
      role: workspace-integrator
      task: |
        Smoke test only. In the swarm workspace, read signals/builder.txt and
        signals/reviewer.txt, then write output/final.md with "done" and
        signals/integrator.txt with exactly OK.
      waits_for: [builder, reviewer]
