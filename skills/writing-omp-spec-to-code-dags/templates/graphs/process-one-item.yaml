# yaml-language-server: $schema=../../../../src/swarm/dag.schema.json
#
# One repeated round selects one stable requirement item, delegates each independently
# reviewable phase to a reusable child graph, then commits one durable acceptance event.
# Parent graph controls provide cross-phase correction without flattening phase internals.
swarm:
  name: spec-to-code-process-one-item
  workspace: /home/katph/personal/omp-cradle
  mode: parallel
  target_count: 1
  model: pi/default
  concurrency: 3
  restart_policy:
    max_restarts: 8
    max_restarts_per_target: 3
    max_node_attempts: 4
  nodes:
    select_or_resume_item:
      type: agent
      role: Single-item selector and interpretation owner
      workload:
        profile: planning
        estimated_usage:
          input_tokens: 35000
          output_tokens: 6000
          cache_read_tokens: 15000
          cache_write_tokens: 3000
      task: |
        ### Goal
        Claim or resume exactly one stable requirement item for this child round.

        ### Inputs
        - .omp-swarm/spec-to-code/run/signals/prepare.control.yaml.
        - .omp-swarm/spec-to-code/state/spec-index.json,
          .omp-swarm/spec-to-code/state/item-ledger.json,
          .omp-swarm/spec-to-code/state/active-batch.json, and
          .omp-swarm/spec-to-code/run/meta/prepare.json.
        - Complete cited specification sections and dependency dispositions.
        - Exact revision-1 operator approval and deviation inputs.
        - .omp-swarm/spec-to-code/state/approval-pauses/<item-id>.json when present.
        - The latest completion-audit report only when the ledger says it reopened this
          item.

        ### Files to touch
        - .omp-swarm/spec-to-code/state/item-ledger.json: preserve the top-level schema
          and every unrelated item.
          For the selected items[item_id], write status, selection_id,
          supersedes_selection_id, repair_counted, durable_pass_count,
          approval_resume_count, phase_dispositions{}, reopen_findings[],
          accepted_event_path, accepted_event_sha256,
          acceptance_event_history[{selection_id,event_path,event_sha256,
          superseded_by_selection_id,counted,archived_at}], and last_updated_at.
        - .omp-swarm/spec-to-code/run/handoffs/current-item.json: write schema_revision,
          batch_id, selection_id, supersedes_selection_id, repair_counted, item_id,
          requirement_id, specification_fingerprint, input_fingerprint,
          source_citations[{source_id,path,start_line,end_line,sha256}], normative_text,
          acceptance_criteria[{criterion_id,text,criticality}], dependencies[],
          dependency_dispositions{}, criticality, public_interfaces[], discovery_scope[],
          contract_only_paths[], implementation_only_paths[],
          shared_paths[{path,from,to,transfer_after}], forbidden_paths[],
          predecessor_revalidations[], approval_refs[], deviation_refs[],
          phase_dispositions{}, status (SELECTED, RESUMED, NO_WORK, or BLOCKED), reason,
          and generated_at.
          For NO_WORK, item-, selection-, requirement-, input-, approval-, and
          deviation-specific scalar fields are null, arrays/maps are empty, and the
          batch and specification fingerprints remain required.
        - .omp-swarm/spec-to-code/run/reports/item-selection.json: write schema_revision,
          batch_id, selection_id, supersedes_selection_id, repair_counted, item_id,
          specification_fingerprint, input_fingerprint, candidate_item_ids[],
          dependency_evidence[], approval_match{approval_id,matched,reason},
          pass_count_before, pass_count_after, approval_resume_count_before,
          approval_resume_count_after, status (SELECTED, RESUMED, NO_WORK, or BLOCKED),
          reason, and generated_at.
          For NO_WORK, selection_id, supersedes_selection_id, item_id, and
          input_fingerprint are null, repair_counted is false, and the batch and
          specification fingerprints remain required.

        ### Task
        1. Require the prepare control to say continue. Match batch ID and specification
           fingerprint across all durable and preparation inputs.
        2. Prefer an existing IN_PROGRESS or explicitly reopened item. Otherwise choose
           the highest-priority dependency-ready pending or impacted item.
        3. Set NO_WORK only when reconciliation finds no pending, impacted, reopened, or
           in-progress item.
        4. For actionable work, put schema revision; batch, selection, and item IDs and
           fingerprints; source citations; normative text; acceptance criteria;
           dependencies; criticality; contract and implementation ownership; same-item
           shared paths and transfer boundary; forbidden paths; approval references;
           and phase dispositions in current-item.json. For NO_WORK, write only the
           required batch/specification identity, empty item-specific collections, and
           the explicit null fields defined by its schema.
        5. Allow same-item path overlap because phase writers are serialized. Reject
           cross-item mutable overlap unless an explicit dependency transfers ownership
           and requires predecessor-criterion revalidation.
        6. Match approval only when requirement_id and spec_fingerprint match, every
           generated method is allowed, and plan_fingerprint is null or exact.
        7. When a same-item/spec/plan APPROVAL_REQUIRED pause gains matching approval,
           increment approval_resume_count without spending an item pass. Otherwise
           charge every actionable invocation against the durable item-pass limit.
        8. Retain selection_id, supersedes_selection_id, and repair_counted when resuming
           the same IN_PROGRESS item. For a REOPENED accepted item, require its prior
           event in acceptance_event_history, mint a new selection_id, persist the prior
           accepted selection as supersedes_selection_id, set repair_counted when that
           selection is in counted_selection_ids, copy both fields to the current-item
           and selection reports, and mark the item IN_PROGRESS.

        ### Outputs
        - One current-item packet for downstream phase graphs, or an explicit NO_WORK
          packet.
        - One current item-selection report.
        - One reconciled ledger with enforced item-pass and approval-resume limits.

        ### Rules
        - This node is the sole current writer of the three listed files.
        - Treat .omp-swarm/spec-to-code/state/active-batch.json and every other
          durable-state file as read-only.
        - Do not write project files, specifications, operator inputs, phase artifacts,
          signals, or runtime-owned .swarm_* paths.
        - Relinquish ledger ownership to advance_item after selection settles.
        - Consume only deltas matching batch, item, selection, fingerprints, and target
          phase.
        - Replace owned files atomically and preserve unrelated ledger entries and
          closed findings.

        ### Retry and failure
        - Retry idempotently from current durable state.
        - A retry for the same IN_PROGRESS item must preserve selection_id. A reopened
          item mints exactly one replacement selection and then preserves it on retry.
          Never double-charge item or approval-resume budgets.
      reports_to: [contract_phase]

    contract_phase:
      type: graph
      path: ./item-contract.yaml
      waits_for: [select_or_resume_item]
      reports_to: [behavior_plan_phase]
      control:
        signal: .omp-swarm/spec-to-code/run/signals/contract-phase.control.yaml
        allowed_restart_targets: [select_or_resume_item, contract_phase]

    behavior_plan_phase:
      type: graph
      path: ./item-behavior-plan.yaml
      waits_for: [contract_phase]
      reports_to: [red_evidence_phase]
      control:
        signal: .omp-swarm/spec-to-code/run/signals/behavior-plan-phase.control.yaml
        allowed_restart_targets:
          - select_or_resume_item
          - contract_phase
          - behavior_plan_phase

    red_evidence_phase:
      type: graph
      path: ./item-red-evidence.yaml
      waits_for: [behavior_plan_phase]
      reports_to: [implementation_phase]
      control:
        signal: .omp-swarm/spec-to-code/run/signals/red-evidence-phase.control.yaml
        allowed_restart_targets:
          - select_or_resume_item
          - contract_phase
          - behavior_plan_phase
          - red_evidence_phase

    implementation_phase:
      type: graph
      path: ./item-implementation.yaml
      waits_for: [red_evidence_phase]
      reports_to: [advance_item]
      control:
        signal: .omp-swarm/spec-to-code/run/signals/implementation-phase.control.yaml
        allowed_restart_targets:
          - select_or_resume_item
          - contract_phase
          - behavior_plan_phase
          - red_evidence_phase
          - implementation_phase

    advance_item:
      type: agent
      role: Durable item ledger and repeat-signal owner
      workload:
        profile: general
        estimated_usage:
          input_tokens: 20000
          output_tokens: 4000
          cache_read_tokens: 10000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Merge accepted item evidence, close the selection, update the durable batch
        counter, and choose the bounded repeat result.

        ### Inputs
        - .omp-swarm/spec-to-code/run/handoffs/current-item.json.
        - Every current phase report and all four phase control decisions.
        - Current hashes for every declared changed file.
        - .omp-swarm/spec-to-code/state/spec-index.json,
          .omp-swarm/spec-to-code/state/item-ledger.json, and
          .omp-swarm/spec-to-code/state/active-batch.json.

        ### Files to touch
        - .omp-swarm/spec-to-code/state/item-ledger.json: preserve its schema and
          unrelated records. For
          items[item_id], write final status, selection_id, supersedes_selection_id,
          repair_counted, phase_dispositions, accepted_event_path,
          accepted_event_sha256, acceptance_event_history[], reopen_findings, and
          last_updated_at.
        - .omp-swarm/spec-to-code/state/active-batch.json: preserve batch identifiers
          and configured limits;
          write current_item_id, accepted_item_count, counted_selection_ids[], status,
          and updated_at. For an ordinary first acceptance, add selection_id and
          increment the counter once. For repair_counted, atomically replace the
          superseded selection marker with the replacement selection without changing
          accepted_item_count.
        - .omp-swarm/spec-to-code/state/audit/<batch-id>/<item-id>/<selection-id>.json:
          write one immutable JSON
          object with schema_revision, batch_id, selection_id, item_id,
          specification_fingerprint, input_fingerprint, output_fingerprint, status
          ACCEPTED, item_review{path,sha256,decision}, phase_reports[{path,sha256}],
          phase_controls[{path,sha256,action}], approved_method, observed_behavior,
          accepted_deviation_ids[], changed_files[{path,sha256}],
          requirement_coverage[{criterion_id,evidence}], predecessor_revalidations[],
          generated_at, and content_sha256.
        - .omp-swarm/spec-to-code/run/reports/item-advance.json: write schema_revision,
          batch_id, selection_id, supersedes_selection_id, repair_counted, item_id,
          validated_hashes[], acceptance_event_path, acceptance_event_sha256,
          accepted_item_count_before, accepted_item_count_after, counted_now,
          replaced_counted_selection_id, remaining_dependency_ready_item_ids[], signal,
          status (ACCEPTED, SKIPPED, or BLOCKED), reason, and generated_at.
        - .omp-swarm/spec-to-code/run/signals/process-one-item.txt: write exactly one
          line containing NEXT_ITEM,
          BATCH_COMPLETE, or BLOCKED, followed by a newline and no other text.

        ### Task
        1. After implementation_phase continues, reacquire sole ledger ownership and
           take sole active-batch ownership until the round settles.
        2. For matching NO_WORK and four continued phase controls ending in a SKIPPED
           item review, confirm no pending, impacted, reopened, or in-progress item
           exists; leave the ledger, acceptance history, counted selections, and counter
           unchanged; write a SKIPPED advance report and BATCH_COMPLETE; and create no
           acceptance event.
        3. Otherwise match batch, selection, item, input/output, review, phase-control,
           ownership, and current source hashes before mutation.
        4. Match supersedes_selection_id and repair_counted across the current-item
           handoff and ledger before settlement; preserve them on BLOCKED.
        5. Build the acceptance event with schema revision; batch, selection, and item
           IDs and fingerprints; ACCEPTED status; item-review decision and hash; every
           phase report and control hash; approved method and observed behavior;
           accepted-deviation IDs; exact changed paths and source hashes; requirement
           coverage; transferred predecessor criteria; generated_at; and content hash.
        6. Require a fresh event path for a replacement selection. Store its exact path
           and hash in the ledger; identical existing content is idempotent success and
           conflicting content is BLOCKED.
        7. Mark the item ACCEPTED only when all four phase controls continued and
           end-to-end review passed. Increment accepted_item_count exactly once for a
           never-counted item. For repair_counted, atomically set the superseded
           history record's superseded_by_selection_id to the replacement selection,
           replace the superseded counted selection ID with the replacement without
           changing the counter, then clear the ledger's pending
           supersedes_selection_id and repair_counted. Preserve pending lineage unless
           the complete settlement succeeds.
        8. Write NEXT_ITEM only when dependency-ready work remains and
           accepted_item_count is below item_limit. Write BATCH_COMPLETE when no work
           remains or the limit is reached.

        ### Outputs
        - One immutable acceptance event for an accepted selection, or no event for
          NO_WORK.
        - Reconciled ledger and active-batch state.
        - One item-advance report.
        - One bounded repeat signal.

        ### Rules
        - Do not edit project source, handoffs, phase reviews, specifications, operator
          inputs, or runtime-owned .swarm_* paths.
        - Do not accept or increment on missing, stale, failed, or BLOCKED evidence.
          Record the blocker and write BLOCKED instead.
        - Keep accepted_item_count stable across a counted repair; otherwise increment it
          once per newly accepted item, never once per retry.
        - Replace mutable owned files atomically; never replace a conflicting immutable
          acceptance event.

        ### Retry and failure
        - Retry must reproduce the same event, ledger, counter, report, and signal
          without double-counting.
        - Any hash mismatch or conflicting event is BLOCKED with actionable evidence.
      waits_for: [implementation_phase]
