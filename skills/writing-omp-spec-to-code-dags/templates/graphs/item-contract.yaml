# yaml-language-server: $schema=../../../../src/swarm/dag.schema.json
#
# Reusable contract phase for one selected specification item. The terminal reviewer
# writes the parent process graph's control decision.
swarm:
  name: spec-to-code-item-contract
  workspace: /home/katph/personal/omp-cradle
  mode: parallel
  target_count: 1
  model: pi/default
  concurrency: 1
  nodes:
    plan_contract:
      type: agent
      role: Current-item contract planner
      workload:
        profile: planning
        estimated_usage:
          input_tokens: 30000
          output_tokens: 6000
          cache_read_tokens: 12000
          cache_write_tokens: 3000
      task: |
        ### Goal
        Produce the smallest contract plan that makes the selected item's observable
        behavior explicit.

        ### Inputs
        - run/handoffs/current-item.json and its complete cited specification.
        - Current project conventions and existing contracts inside bounded ownership.
        - The latest matching contract-review delta and any later matching item-review
          delta.

        ### Files to touch
        - run/handoffs/contract-plan.json: write schema_revision, batch_id, selection_id,
          item_id, specification_fingerprint, input_fingerprint, source_hashes{},
          criteria[{criterion_id,contract_symbols[],inputs[],outputs[],errors[],
          compatibility,paths[],verification}], contract_only_paths[],
          implementation_only_paths[], shared_paths[{path,from,to,transfer_after}],
          cross_item_transfers[{path,from_item,to_item}],
          predecessor_revalidations[{item_id,criterion_id}], ownership_fingerprint,
          plan_fingerprint, status (READY, SKIPPED, or BLOCKED), reason, and generated_at.
        - run/reports/contract-plan.json: write schema_revision, batch_id, selection_id,
          item_id, input_fingerprint, plan_path, plan_sha256, ownership_fingerprint,
          matched_delta_ids[], unresolved_criterion_ids[], status matching the handoff,
          reason, and generated_at.

        ### Task
        1. Match every delta to this batch, item, selection, fingerprints, and contract
           phase.
        2. Map every acceptance criterion to contract symbols, input, output, error
           behavior, compatibility, exact paths or bounded discovery, and focused
           verification.
        3. Partition ownership into contract_only_paths, implementation_only_paths, and
           shared_paths. For each shared path, record transfer from implement_contract
           to implementation_phase after contract review.
        4. Record every allowed cross-item transfer and each predecessor criterion that
           the successor must revalidate.
        5. Bind the plan fingerprint to the selection and all ownership sets.

        ### Outputs
        - A current contract plan and matching plan report.
        - On NO_WORK, current SKIPPED artifacts and no other edits.

        ### Rules
        - Do not edit project source, tests, specifications, durable state, sibling
          reports, signals, or runtime-owned .swarm_* paths.
        - Change the plan only for current source evidence or a matching concrete review
          delta.
        - Replace both owned artifacts atomically.

        ### Retry and failure
        - Retry idempotently from current inputs.
        - Report BLOCKED when ownership, authority, or required contract behavior cannot
          be made explicit inside the bounded scope.
      reports_to: [implement_contract]

    implement_contract:
      type: agent
      role: Current-item contract implementer
      workload:
        profile: implementation
        estimated_usage:
          input_tokens: 45000
          output_tokens: 10000
          cache_read_tokens: 18000
          cache_write_tokens: 5000
      task: |
        ### Goal
        Implement only the selected item's accepted contract plan in the project.

        ### Inputs
        - Current-item and contract-plan artifacts.
        - Current project policy and existing source in contract_only_paths and
          shared_paths.
        - Matching contract-review and item-review deltas.
        - Current batch, selection, plan, source, and ownership fingerprints.

        ### Files to touch
        - Project files in contract_only_paths: write only the planned public contract
          symbols, type or schema declarations, input and output shapes, documented
          errors, and compatibility behavior named by criteria[].contract_symbols.
        - Project files in shared_paths: write the same planned contract declarations
          plus only the minimum colocated code required for those declarations to remain
          valid; record each path for later ownership transfer.
        - run/reports/contract-implementation.json: write schema_revision, batch_id,
          selection_id, item_id, input_fingerprint, plan_fingerprint,
          ownership_fingerprint, source_hashes_before{}, source_hashes_after{},
          edits[{path,symbols[],criterion_ids[],change_summary}],
          shared_path_transfers[{path,from,to,transfer_after}], verification_plan[],
          matched_delta_ids[], status (READY, SKIPPED, or BLOCKED), reason, and
          generated_at.

        ### Task
        1. Validate every input fingerprint and ownership boundary before editing.
        2. Resolve bounded discovery to exact owned paths.
        3. Use project-appropriate symbol and reference tooling before changing public
           interfaces.
        4. Implement the accepted contracts using current project compatibility and
           error conventions.
        5. Remove obsolete replaced behavior instead of adding unrequired shims.
        6. On NO_WORK or BLOCKED, make no project edit and write the corresponding
           report.

        ### Outputs
        - Current contract source in the owned paths.
        - One contract-implementation report.
        - On continued review, shared_paths ready for transfer to
          implementation_phase.

        ### Rules
        - Do not edit any unowned project path, specification, durable state, review,
          signal, unrelated work, or runtime-owned .swarm_* path.
        - Do not use a bounded discovery result until it resolves to exact paths.
        - Replace the report atomically.

        ### Retry and failure
        - Retry idempotently against current files and matching deltas.
        - Restarting this phase re-establishes contract ownership of shared_paths.
      waits_for: [plan_contract]
      reports_to: [check_contract]

    check_contract:
      type: agent
      role: Project-native contract verification executor
      workload:
        profile: general
        estimated_usage:
          input_tokens: 20000
          output_tokens: 4000
          cache_read_tokens: 8000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Execute the smallest established read-only project-native check that verifies
        the selected contract changes.

        ### Inputs
        - Current project policy and relevant project-owned manifests or configuration.
        - Current contract plan and contract-implementation report.
        - Current project source in the declared contract ownership.

        ### Files to touch
        - run/reports/contract-check.json: write schema_revision, batch_id, selection_id,
          item_id, input_fingerprint, plan_fingerprint, ownership_fingerprint,
          source_hashes{}, discovery_evidence[{path,sha256,finding}], command, cwd,
          covered_paths[], covered_criterion_ids[], applicability (APPLICABLE or
          NOT_APPLICABLE), exit_code, safe_output_summary, status (PASS, FAIL, or
          BLOCKED), reason, and generated_at.

        ### Task
        1. Discover the applicable toolchain and established verification command from
           current project evidence.
        2. Validate that the command is read-only and covers the selected contract
           changes.
        3. Execute it against current source.
        4. Report BLOCKED when no safe applicable command exists.

        ### Outputs
        - One current contract-check report.

        ### Rules
        - Do not assume a language, package manager, manifest, source layout, or fixed
          command.
        - Do not install dependencies, invent commands, generate configuration, or
          mutate project files.
        - Do not edit any artifact except the owned report.

        ### Retry and failure
        - Retry by rediscovering when project evidence changed, then execute the current
          validated command again.
        - Never fabricate success for a missing tool or command.
      waits_for: [implement_contract]
      reports_to: [review_contract]

    review_contract:
      type: agent
      role: Independent current-item contract reviewer
      workload:
        profile: review
        estimated_usage:
          input_tokens: 40000
          output_tokens: 7000
          cache_read_tokens: 18000
          cache_write_tokens: 3000
      task: |
        ### Goal
        Independently accept the contract phase, request one reachable parent
        correction, or fail safely.

        ### Inputs
        - Actual contract source and cited specification.
        - Current-item, contract-plan, contract-implementation, and contract-check
          artifacts.
        - Prior matching contract-review delta and read-only ledger.

        ### Files to touch
        - run/reports/contract-review.json: write schema_revision, batch_id, selection_id,
          item_id, input_fingerprint, plan_sha256, implementation_report_sha256,
          check_report_sha256, reviewed_source_hashes{}, decision (ACCEPTED, REJECTED,
          SKIPPED, or BLOCKED), findings[], reason, and generated_at. Each findings[]
          record contains finding_id, criterion_id, severity, observed, required,
          evidence[], required_mutation, owner, acceptance_check, and status.
        - run/signals/contract-phase.control.yaml: write action and reason. For restart,
          also write target as exactly select_or_resume_item or contract_phase. For
          continue or fail, omit target.

        ### Task
        1. Match all identifiers and fingerprints.
        2. Verify that the applicable project-native contract check is PASS, or that
           NO_WORK is valid.
        3. Verify every critical criterion has contract coverage and every shared-path
           ownership transfer is explicit.
        4. Continue only when no blocker remains.
        5. Restart select_or_resume_item for item-interpretation defects.
        6. Restart contract_phase for plan, contract-source, ownership, or
           command-evidence defects.

        ### Outputs
        - One contract-review delta.
        - One valid parent control decision.

        ### Rules
        - Do not edit inspected source, plans, durable state, specifications, operator
          inputs, sibling reports, or runtime-owned .swarm_* paths.
        - A restart target must contain every writer needed to change the rejected
          predicate.
        - Replace the report and control file atomically.

        ### Retry and failure
        - Fail for ambiguity, out-of-scope edits, unavailable authority, no progress, or
          exhausted limits.
        - The control decision is exactly continue, restart with one allowed parent
          target and reason, or fail with reason.
      waits_for: [check_contract]
