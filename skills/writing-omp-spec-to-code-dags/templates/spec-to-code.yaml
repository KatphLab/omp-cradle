# yaml-language-server: $schema=../../../src/swarm/dag.schema.json
#
# Lean, gated specification-to-code workflow.
# Before running:
#   1. Point workspace at the existing project root.
#   2. Replace PROJECT_ANCHOR in the plan task with an exact project file.
#   3. Put the bounded specification at
#      .omp-swarm/spec-to-code/input/spec.md, or replace that path consistently.
#   4. If you rename the swarm, replace every .omp-swarm/spec-to-code/ path.
swarm:
  name: spec-to-code
  workspace: ../../..
  mode: parallel
  target_count: 1
  concurrency: 1
  model: pi/default
  model_routing:
    enabled: true
    allowed_aliases: [pi/task, pi/default, pi/slow, pi/plan, pi/advisor]
    minimum_quality: standard
    max_estimated_cost_usd: 150
    allow_zero_marginal_cost: true
    default_usage:
      input_tokens: 20000
      output_tokens: 4000
      cache_read_tokens: 5000
      cache_write_tokens: 1000
  restart_policy:
    max_restarts: 4
    max_restarts_per_target: 2
    max_node_attempts: 3
  nodes:
    plan:
      type: agent
      role: Specification and test-plan author
      workload:
        profile: planning
        estimated_usage:
          input_tokens: 45000
          output_tokens: 8000
          cache_read_tokens: 12000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Map the bounded specification to exact observable contracts, approved RED-test
        scenarios, source ownership, and project-native commands.

        ### Inputs
        - `PROJECT_ANCHOR` (replace this placeholder before running).
        - `.omp-swarm/spec-to-code/input/spec.md`, which is operator-owned and read-only.
        - Current project policy, manifests, configuration, public entry points, and the
          bounded source and test areas needed to plan the change.
        - Current `design-review.md` or `red-review.md` findings when this node is
          restarted.

        ### Files to touch
        - Remove and recreate only the literal `.omp-swarm/spec-to-code/run/` subtree.
        - Write `.omp-swarm/spec-to-code/run/plan.md` with status (`READY` or `BLOCKED`),
          specification and anchor SHA-256, requirement matrix, test paths,
          implementation paths, ordered work, targeted checks, and full project gate.
        - Each requirement row contains stable ID, exact citation, observable acceptance,
          planned public boundary, realistic input, exact expected result, plausible bug,
          test path, implementation paths, and check IDs.
        - Each check is fixed `{program, args, cwd, env, purpose, executors,
          mutable_outputs[{path,disposition}]}` data derived from project policy, never a
          shell command copied from specification prose. Executors are an ordered,
          non-empty subset of `red`, `review_red`, `implement`, and `review`;
          disposition is `PRESERVE` or `REMOVE_AFTER_RUN`.

        ### Task
        1. Read applicable prior findings, then verify the exact project anchor and
           specification before cleaning current-run artifacts.
        2. Resolve the literal run path inside the workspace. Reject empty paths, `..`,
           globs, and symlink escape; recreate only that subtree.
        3. Map every normative requirement to one or more observable behaviors. Include
           success, boundary, error, precedence, and side-effect cases when specified.
        4. For every planned test, name the public API call, exact assertion, and a
           plausible wrong implementation that must fail it. Do not plan existence,
           import-only, framework, fixture, broad-mock, or placeholder tests.
        5. Assign exact test paths to `red` and exact production/configuration/docs paths
           to `implement`. The sets are disjoint and include every required mutation.
        6. Discover the smallest targeted RED command and established full project gate
           from current project policy and tooling. Declare every path each command may
           write. Ownership transfers serially between its listed executors; each
           executor applies the declared disposition before settlement.
        7. Reject commands with unbounded or unknown writes. Review executors may write
           only bounded scratch, cache, or diagnostic outputs, never project deliverables.
        8. Write `BLOCKED` for ambiguity, missing authority, unsafe workspace, ownership
           overlap, unavailable checks, unsafe command outputs, or scope too broad for
           one implementation owner; otherwise write `READY`.

        ### Outputs
        One complete test and implementation plan covering every normative requirement,
        or one actionable blocker. Missing target behavior is planned work, not a blocker.

        ### Rules
        Do not edit project files, the specification, `.swarm_*`, cache, history, or any
        path outside the current-run subtree. Preserve unrelated user work.

        ### Retry and failure
        Rerun idempotently from current authority and source. Read findings before run
        cleanup, correct the cited planning defect, and never assume source rollback.

    contract:
      type: agent
      role: Observable contract designer
      workload:
        profile: planning
        estimated_usage:
          input_tokens: 35000
          output_tokens: 6000
          cache_read_tokens: 10000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Freeze the smallest public contract that makes every planned behavior precise
        before tests or production implementation begin.

        ### Inputs
        - `.omp-swarm/spec-to-code/input/spec.md`.
        - A `READY` `.omp-swarm/spec-to-code/run/plan.md` matching the specification.
        - Existing public interfaces and conventions in the plan's bounded project scope.
        - Current `design-review.md` or `red-review.md` findings when this node is
          restarted.

        ### Files to touch
        - Write `.omp-swarm/spec-to-code/run/contract.md` with status (`READY` or
          `BLOCKED`), plan and specification SHA-256, and one contract record per
          requirement: public boundary and signature, input/output types, validation,
          defaults and precedence, exact errors, state changes or emitted events,
          invariants, compatibility constraints, and rationale.

        ### Task
        1. Require a current `READY` plan covering every normative requirement.
        2. Reuse an existing public boundary when it cleanly expresses the specified
           behavior. Otherwise define the smallest boundary in project vocabulary.
        3. Resolve every test-visible type, error, default, ordering rule, side effect,
           and compatibility condition. Do not prescribe private implementation details.
        4. Reconcile applicable review findings and write `BLOCKED` rather than inventing
           behavior when specification authority is ambiguous.

        ### Outputs
        One precise observable contract suitable for RED tests, or one actionable blocker.

        ### Rules
        Do not edit project source, test files, the plan, specification, review artifacts,
        or `.swarm_*`. Do not add production stubs or placeholder implementations.

        ### Retry and failure
        Replace only `contract.md`. Preserve stable requirement IDs and correct contract
        decisions; correct only findings owned by `contract`.
      waits_for: [plan]

    review_design:
      type: agent
      role: Independent test-plan and contract reviewer
      workload:
        profile: review
        estimated_usage:
          input_tokens: 40000
          output_tokens: 7000
          cache_read_tokens: 12000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Approve a complete, executable test plan and observable contract before any RED
        test or production code is written.

        ### Inputs
        - The specification, current `plan.md`, current `contract.md`, project policy,
          and the actual bounded project files named by the plan.

        ### Files to touch
        - Write `.omp-swarm/spec-to-code/run/design-review.md` with specification, plan,
          and contract SHA-256; per-requirement results; findings; decision (`ACCEPTED`,
          `REJECTED`, or `BLOCKED`); and reason. Each finding names evidence, required
          mutation, current owner, and acceptance check.
        - Write `.omp-swarm/spec-to-code/run/design-review.control.yaml` using exact OMP
          control grammar.

        ### Task
        1. Review every normative requirement against its citation, acceptance behavior,
           test scenario, plausible bug, ownership, checks, and contract.
        2. Reject vague assertions, missing error or boundary behavior, tests that can
           pass without implementation, mocked units under test, ownership overlap,
           unsafe commands, executors outside `red`, `review_red`, `implement`, and
           `review`, unbounded or undeclared command outputs, and contracts that expose
           private structure.
        3. Restart `plan` for requirement coverage, path, test-plan, or command defects.
           Restart `contract` for public API, error, invariant, default, precedence, or
           compatibility defects.
        4. Continue only when RED tests can be written directly from accepted records.
           Fail for unresolved specification authority or unreachable correction.

        ### Outputs
        One independent design review and exactly one control decision: continue for
        `ACCEPTED`, restart `plan` or `contract` for correctable rejection, or fail for
        `BLOCKED`.

        ### Rules
        Do not edit project files, specification, plan, contract, or `.swarm_*`. Review
        actual project conventions, not summaries alone.

        ### Retry and failure
        Recompute from current files and hashes. Never restart without an exact defect,
        owner, required mutation, and acceptance check.
      waits_for: [contract]
      control:
        signal: .omp-swarm/spec-to-code/run/design-review.control.yaml
        allowed_restart_targets: [plan, contract]

    red:
      type: agent
      role: Executable RED-test author
      workload:
        profile: implementation
        estimated_usage:
          input_tokens: 45000
          output_tokens: 9000
          cache_read_tokens: 12000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Turn every accepted behavior into an executable test that calls the planned
        public boundary, asserts an exact result, and proves the expected pre-change gap.

        ### Inputs
        - The specification, current `plan.md`, `contract.md`, and accepted
          `design-review.md` plus its continued control signal.
        - Current test conventions and exact test paths owned by `red`.
        - Current `red-review.md` findings when this node is restarted.

        ### Files to touch
        - Edit only exact test paths assigned to `red` by the accepted plan.
        - During command execution, write only mutable-output paths assigned to `red`;
          apply each output's `PRESERVE` or `REMOVE_AFTER_RUN` disposition.
        - Write `.omp-swarm/spec-to-code/run/red.md` with design-review, plan, contract,
          specification, test-file, and preserved command-output SHA-256; per-test
          requirement ID, public call, assertion, command result, observed failure,
          expected failure, status (`EXPECTED_RED`, `ALREADY_SATISFIED`, or `BLOCKED`),
          and reason.

        ### Task
        1. Require hash-matched accepted design evidence before touching tests.
        2. Write the smallest meaningful tests. Import the planned API at module scope,
           use realistic inputs, call it directly, and assert exact output, error code,
           state, event, serialized payload, or visible result.
        3. Never mock the unit under test or hide missing APIs with dynamic imports,
           fallbacks, TODOs, generic assertions, or snapshot-only checks.
        4. Run only accepted targeted RED commands that list `red` as an executor.
           Verify their actual writes remain inside declared mutable outputs and apply
           each disposition. Classify missing approved module or symbol as expected RED;
           reject infrastructure, syntax, fixture, unrelated, or ambiguous failures.
        5. Record `ALREADY_SATISFIED` only when exact behavior already passes and name the
           plausible product defect that would make the test fail.

        ### Outputs
        Executable behavior tests and complete pre-implementation evidence for every
        planned test, or one actionable blocker.

        ### Rules
        Do not edit production, configuration, documentation, specification, plan,
        contract, review artifacts, control signals, `.swarm_*`, or command outputs not
        explicitly assigned to `red`.

        ### Retry and failure
        Before implementation, rerun idempotently from accepted design and current tests.
        Correct only test or RED-evidence findings owned by `red`.
      waits_for: [review_design]

    review_red:
      type: agent
      role: Independent RED-test reviewer
      workload:
        profile: review
        estimated_usage:
          input_tokens: 40000
          output_tokens: 7000
          cache_read_tokens: 12000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Prove the tests are executable specifications and fail for the intended missing
        behavior before production implementation begins.

        ### Inputs
        - The specification, accepted `plan.md`, `contract.md`, `design-review.md`,
          actual test files, and `red.md`.
        - Current production boundaries needed to classify observed failures.

        ### Files to touch
        - During command execution, write only mutable-output paths assigned to
          `review_red`; apply each declared disposition. These outputs must not be
          project deliverables.
        - Write `.omp-swarm/spec-to-code/run/red-review.md` with all upstream, test, and
          preserved command-output SHA-256; per-test requirement, public call, assertion,
          plausible bug, rerun result, failure classification, findings, decision
          (`ACCEPTED`, `REJECTED`, or `BLOCKED`), and reason.
        - Write `.omp-swarm/spec-to-code/run/red-review.control.yaml` using exact OMP
          control grammar.

        ### Task
        1. Inspect every actual test and rerun every accepted RED command that lists
           `review_red` as an executor before any production writer is scheduled. Verify
           actual writes stay within declared outputs and apply their dispositions.
        2. Require each test to call the approved public API and assert concrete product
           behavior. Confirm it fails for the expected reason or is demonstrably already
           satisfied and would fail for a named plausible defect.
        3. Reject existence checks, broad mocks, framework tests, fixture assertions,
           weak assertions, hidden imports, incidental snapshots, and unexpected failures.
        4. Restart `red` for test-code or evidence defects, `contract` for public-boundary
           defects, or `plan` for behavior coverage or test-plan defects.
        5. Continue only with complete hash-matched RED evidence. Fail for missing
           authority or unreachable correction.

        ### Outputs
        One independent RED review and exactly one control decision: continue for
        `ACCEPTED`, restart the owning upstream node, or fail for `BLOCKED`.

        ### Rules
        Do not edit production, tests, specification, plan, contract, RED evidence,
        `.swarm_*`, project deliverables, or command outputs not assigned to `review_red`.
        Do not weaken expectations to match current behavior.

        ### Retry and failure
        Recompute from current test files and fresh command output. Restart only while
        production implementation has not begun in this run.
      waits_for: [red]
      control:
        signal: .omp-swarm/spec-to-code/run/red-review.control.yaml
        allowed_restart_targets: [plan, contract, red]

    implement:
      type: agent
      role: Contract-driven production implementer
      workload:
        profile: implementation
        estimated_usage:
          input_tokens: 55000
          output_tokens: 11000
          cache_read_tokens: 16000
          cache_write_tokens: 3000
      task: |
        ### Goal
        Implement the accepted observable contract and make every accepted RED test GREEN
        without changing tests or weakening the contract.

        ### Inputs
        - The specification, accepted `plan.md`, `contract.md`, `design-review.md`, actual
          accepted test files, `red.md`, and accepted `red-review.md` plus continued
          control signals.
        - Current implementation paths and project policy.
        - Current `final-review.control.yaml` findings when this node is restarted.

        ### Files to touch
        - Edit only exact production, configuration, documentation, and generated paths
          assigned to `implement` by the accepted plan.
        - During command execution, write only mutable-output paths assigned to
          `implement`; apply each declared disposition.
        - Write `.omp-swarm/spec-to-code/run/implementation.md` with all authority and
          test SHA-256; source-before and source-after SHA-256 for every implementation
          path; `mutation_started`; changed paths; preserved command-output SHA-256;
          per-requirement results; check results; status (`READY`, `NO_CHANGE`, or
          `BLOCKED`); and reason.

        ### Task
        1. Hash every planned implementation path before any mutation.
        2. Require current accepted design and RED evidence with matching specification,
           plan, contract, and test hashes. If authority is missing or malformed, mutate
           nothing and write `BLOCKED` with `mutation_started: false`, source-before
           hashes, identical source-after hashes, and the exact evidence defect.
        3. Reconcile current source and applicable final-review findings. Preserve correct
           prior edits and unrelated user work.
        4. Implement the smallest complete production behavior using existing project
           conventions. Set `mutation_started: true` before the first project mutation.
           Remove obsolete behavior; add no speculative features.
        5. Run only accepted commands listing `implement` as an executor. Verify actual
           writes stay within declared outputs, apply their dispositions, and make every
           accepted RED test GREEN. If behavior was already satisfied, make no needless
           source edit.
        6. Hash every implementation path after work and record concrete results. Write
           `READY` or `NO_CHANGE` only when all targeted behavior passes.

        ### Outputs
        Contract-compliant production code and one current implementation report.

        ### Rules
        Never edit accepted tests, specification, plan, contract, review artifacts,
        control signals, `.swarm_*`, project paths outside implementation ownership, or
        command outputs not assigned to `implement`. Do not mock or special-case tests
        in production.

        ### Retry and failure
        Rerun idempotently against the modified tree. Preserve accurate mutation and
        before/after hashes. Repair only production or implementation-report findings
        owned by `implement`; preserve accepted test hashes.
      waits_for: [review_red]

    review:
      type: agent
      role: Independent specification acceptance reviewer
      workload:
        profile: review
        estimated_usage:
          input_tokens: 50000
          output_tokens: 8000
          cache_read_tokens: 15000
          cache_write_tokens: 2000
      task: |
        ### Goal
        Decide whether current production satisfies every normative requirement under
        the accepted contract and tests, with the complete project gate passing.

        ### Inputs
        - The specification; current plan, contract, design review, tests, RED evidence,
          RED review, implementation report, project policy, and actual owned source.

        ### Files to touch
        - During command execution, write only mutable-output paths assigned to `review`;
          apply each declared disposition. These outputs must not be project deliverables.
        - Write one authoritative
          `.omp-swarm/spec-to-code/run/final-review.control.yaml` containing `action`,
          optional `target`, `reason`, hashes for every input and owned source/test file,
          `implementation_mutation_started`, command results, per-requirement results,
          and findings. Each finding names evidence, required mutation, current owner,
          and acceptance check. Do not write a separate final decision report.

        ### Task
        1. Require hash-matched accepted design and RED reviews and unchanged accepted
           tests. Inspect actual production and tests, never reports alone.
        2. Run only accepted commands listing `review` as an executor. Verify actual
           writes stay within declared outputs, apply their dispositions, and execute
           targeted tests, focused checks, and the full project gate against current files.
        3. Trace every normative requirement through contract, test, production behavior,
           and observed result. Reject missing behavior, test-specific implementation,
           unauthorized paths, stale evidence, and hidden regressions.
        4. When `implementation.md` is `BLOCKED` only because `red-review.md` is missing
           or malformed, restart `review_red` only if `mutation_started` is false, every
           current implementation-path hash matches its source-before and source-after
           hash, and accepted test hashes are unchanged.
        5. Restart `implement` only for correctable production, implementation-report, or
           implementation-owned check defects.
        6. Fail when RED-review evidence is defective after any production mutation. Fail
           also for a semantic plan, contract, or RED-test defect discovered after
           implementation, ambiguity, missing authority, unrelated project failure,
           changed accepted tests, or unreachable correction.
        7. Emit `action: continue` only when every requirement is observed and every
           required check passes. The action is the sole final decision.

        ### Outputs
        One authoritative evidence-bearing control decision: continue for accepted
        current behavior, restart `review_red` for the proven pre-mutation evidence case,
        restart `implement` for an owned production defect, or fail with a safe reason.

        ### Rules
        Do not edit project source, tests, specification, upstream evidence, `.swarm_*`,
        project deliverables, or command outputs not assigned to `review`. Review every
        requirement, not a sample. Replace only the authoritative final control artifact.

        ### Retry and failure
        Recompute from current files and fresh command output. Never restart `review_red`
        without proof that implementation did not mutate source. Never restart any node
        without a reachable owner and a predicate its suffix can make true.
      waits_for: [implement]
      control:
        signal: .omp-swarm/spec-to-code/run/final-review.control.yaml
        allowed_restart_targets: [review_red, implement]
