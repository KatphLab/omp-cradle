swarm:
  name: author-complex-dag
  workspace: ..
  mode: parallel
  target_count: 1
  concurrency: 4
  restart_policy:
    max_restarts: 2
    max_restarts_per_target: 2
    max_node_attempts: 3
  nodes:
    prepare:
      type: agent
      role: Portable DAG authoring workspace guard
      task: |
        This template must be copied to <project>/.omp/author-complex-dag.yaml
        before execution, so workspace: .. resolves to the existing project.
        Verify that .omp/author-complex-dag.yaml and
        .omp-swarm/author-complex-dag/input/request.yaml exist and that every
        project anchor declared by the request matches an existing path beneath
        the canonical workspace. Because the YAML already resides under the
        project, reject any resolved workspace other than its existing parent.

        The request must contain: goal and observable completion criteria; a
        non-empty sources list whose records each have a unique id,
        workspace-relative path, semantic domain, authority, normative or
        evidentiary status, and conservative estimated_tokens; source_reading
        with shard_count: 8 and a positive max_estimated_tokens_per_shard; an
        explicit conflict-precedence rule; bounded project inspection paths;
        mutable and forbidden project paths; ownership.clusters with stable IDs,
        exact paths, dependencies, and focused check IDs; ownership.convergence
        with exact shared paths, sole owners, and predecessor clusters; exact
        deterministic acceptance commands with ids, cwd values, and mutable
        outputs; project anchors; operational constraints; and generated_dag with
        path: .omp/generated-complex-task.yaml plus overwrite: fail-if-exists or
        replace-matching-sha256. The replacement form requires the current file's
        expected_sha256. Reject any other generated path, absolute path, path or
        symlink escape, missing source, duplicate ID, vague command such as
        "usual checks", ownership outside mutable_paths, same-wave overlap,
        convergence without one serialized owner, missing precedence, or source
        workload that cannot fit the declared reader budget. Infer nothing.

        Never edit or delete project source, persistent input/, .git, or any
        runtime-owned .swarm_* directory. Before cleanup, enforce generated_dag:
        fail when its fixed output exists under fail-if-exists; under
        replace-matching-sha256, fail unless its current digest exactly matches
        expected_sha256. After all validation succeeds, remove only the literal
        .omp-swarm/author-complex-dag/run/ subtree, recreate its meta/, handoffs/,
        reports/, and signals/ directories, and atomically write a canonical
        request with source, anchor, and accepted prior-output digests to
        .omp-swarm/author-complex-dag/run/meta/request.yaml. Then atomically write
        .omp-swarm/author-complex-dag/run/signals/prepare.control.yaml with:
        action: continue
        reason: authoring request and existing workspace verified

        On invalid input, preserve existing project and input files, create only
        run/signals/ if needed, and atomically write the same control file with
        action: fail and a concrete safe reason. Never emit a second decision.
      control:
        signal: .omp-swarm/author-complex-dag/run/signals/prepare.control.yaml
        allowed_restart_targets: [prepare]

    partition_sources:
      type: agent
      role: Complete-source assignment planner
      task: |
        Read the canonical request. Do not edit project files. Confirm
        source_reading declares exactly eight shards and a positive per-shard
        estimated-token limit. Partition every source ID exactly once among the
        eight fixed reader shards by complete semantic domain and conservative
        estimated context size. Keep one document wholly assigned to one reader;
        a reader may consume it in contiguous chunks but no document may cross
        readers. No shard may exceed max_estimated_tokens_per_shard. If any
        source or the total corpus cannot fit, write a BLOCKED assignment report
        with the exact overload and require a deliberately widened copy of this
        template; never omit, truncate, or silently rebalance beyond the limit.
        Keep conflicting documents in separate packets. Empty shards are valid.
        Atomically write eight manifests to
        .omp-swarm/author-complex-dag/run/handoffs/source-shard-1.yaml through
        source-shard-8.yaml and a total assignment ledger to
        .omp-swarm/author-complex-dag/run/handoffs/source-assignments.yaml. Prove
        source-list set equality, unique assignment, expected digests, domains,
        authority, per-source estimates, and per-shard budget totals.
      waits_for: [prepare]

    analyze_project:
      type: agent
      role: Project architecture and ownership analyst
      task: |
        Read the canonical request. Inspect only its bounded project scope and
        directly applicable project guidance. Do not edit project files or the
        generated DAG. Locate existing conventions, dependency boundaries,
        public symbols and bounded callers, shared convergence files, generated
        files, applicable project commands, and command-generated outputs.
        Verify the declared ownership clusters against actual dependencies and
        references. Keep cluster paths inside mutable_paths, keep same-wave
        clusters disjoint, place declared dependencies first, and assign every
        shared export, registry, manifest, lockfile, index, or generated
        convergence path to its one declared later owner. A mismatch is BLOCKED,
        not permission to invent a cluster or expand the envelope. Do not invent
        checks. Atomically write READY or BLOCKED plus the confirmed ownership,
        dependency order, convergence owners, and focused verification to
        .omp-swarm/author-complex-dag/run/handoffs/project-analysis.md.
      waits_for: [prepare]

    analyze_runtime:
      type: agent
      role: OMP swarm runtime contract analyst
      task: |
        Load the installed writing-omp-swarm-dags skill. Read its Project
        Workflows and Root and Scheduling references, plus every node-type or
        optional-feature reference needed by the requested workflow. Inspect the
        available omp-swarm help and schema when accessible. Do not edit files.
        Derive only supported fields and actual semantics for workspace
        resolution, explicit dependencies and waves, agent concurrency, Bash
        settlement, output paths, imports, control ancestry, bounded restart,
        rewind persistence, resume, and validation. Record that non-zero Bash
        completion does not gate dependents and that scheduler rewind does not
        restore project files. Atomically write a runtime contract, required
        validation command, and anti-pattern list to
        .omp-swarm/author-complex-dag/run/handoffs/runtime-contract.md.
      waits_for: [prepare]

    read_source_shard_1:
      type: agent
      role: Complete source reader one
      task: |
        Read source-shard-1.yaml and every assigned source completely from start
        through end, using contiguous chunks when needed. Do not edit project
        files. For each source, record expected and observed digest, complete
        range ledger, purpose, authority, terminology, normative statements,
        boundary and invalid cases, dependencies, conflicts, supersession claims,
        observable acceptance, exact citations, and consumed estimated-token
        budget. Do not resolve conflicts by preference or promote examples to
        requirements. Atomically write the assigned packets to
        .omp-swarm/author-complex-dag/run/handoffs/sources/reader-1.md, or EMPTY
        when unassigned. Mark changed, unreadable, or over-budget sources BLOCKED.
      waits_for: [partition_sources]

    read_source_shard_2:
      type: agent
      role: Complete source reader two
      task: |
