    verify_source_coverage:
      type: agent
      role: Source coverage gate
      task: |
        Read the canonical request, assignment ledger, all eight shard manifests,
        and all eight reader packets. Do not edit project files. Prove set
        equality among requested, assigned, and completed source IDs; exactly one
        reader per source; matching digests; contiguous start-to-end coverage;
        complete citations; no duplicate or extra source; and every reader within
        the declared estimated-token budget. Atomically write totals, missing and
        duplicate sets, digest mismatches, per-domain and per-shard coverage, and
        COVERAGE_PASS or BLOCKED to
        .omp-swarm/author-complex-dag/run/reports/source-coverage.md. Atomically
        write .omp-swarm/author-complex-dag/run/signals/coverage.control.yaml with
        action: continue only for COVERAGE_PASS. Otherwise write action: fail and
        a concrete reason; incomplete or overloaded source evidence is not
        correctable by guessing or by later authoring nodes.
      waits_for:
        [
          read_source_shard_1,
          read_source_shard_2,
          read_source_shard_3,
          read_source_shard_4,
          read_source_shard_5,
          read_source_shard_6,
          read_source_shard_7,
          read_source_shard_8,
        ]
      control:
        signal: .omp-swarm/author-complex-dag/run/signals/coverage.control.yaml
        allowed_restart_targets: [verify_source_coverage]

    synthesize_design:
      type: agent
      role: Complex workflow architect
      task: |
        Read the canonical request, source coverage, all source packets, project
        analysis, and runtime contract. Inspect cited sources and project paths
        when claims need confirmation. Do not edit project files or the generated
        DAG. Reconcile sources using only declared precedence, retain unresolved
        conflicts as blockers, assign stable global requirement IDs, and map each
        requirement to project symbols, observable acceptance, and one ownership
        cluster. Separate cross-cluster invariants from local rules.

        Design the smallest reliable graph for the requested large task. Use
        complete semantic analysis domains, one precedence-aware synthesis before
        mutation, dependency-layered writers, only disjoint same-wave edit paths,
        one serialized integrator for shared convergence files, independent
        read-only audit lenses, one bounded residual writer, deterministic Bash
        evidence interpreted by an agent, current-tree semantic acceptance, and a
        narrow correction suffix only when each boundary is justified. A static
        graph cannot dynamically create writers from a manifest: choose a fixed
        topology matching the proven ownership clusters or serialize work. Do not
        add nodes for symmetry.

        Atomically write
        .omp-swarm/author-complex-dag/run/handoffs/design.md containing READY or
        BLOCKED; complete requirement-to-node traceability; confirmation or
        rejection of every declared ownership cluster and convergence owner;
        every node's outcome, inputs, owned project and evidence paths, forbidden
        paths, verification, retry and failure behavior; exact edges and expected
        waves; resolved workspace; acceptance commands; concurrency rationale;
        and bounded restart targets. The generated file is fixed at
        .omp/generated-complex-task.yaml with workspace: .. and must use the
        prepare-approved overwrite policy and prior digest. Reject placeholder
        commands, unspecified ownership, source staging, hidden dynamic inputs,
        or a graph that treats dependency settlement as success.
      waits_for: [verify_source_coverage, analyze_project, analyze_runtime]

    author_dag:
      type: agent
      role: OMP swarm DAG implementer
      task: |
        Read the canonical request, runtime contract, and design. If the design is
        BLOCKED, do not create or modify the generated DAG; report the blockers.
        Otherwise confirm the canonical request records the fixed path
        .omp/generated-complex-task.yaml and prepare-approved overwrite policy.
        Write the complete standalone workflow atomically to that path, using the
        verified prior digest when replacement was authorized. Edit no other
        project path. Use only runtime-supported fields and add a schema directive
        only when the target project has a valid schema path or URI.

        Encode every dependency edge explicitly. Use a safe unique swarm name,
        workspace: .., target_count: 1 unless genuine whole-graph iteration is
        proven, and concurrency no wider than safe agent fan-out. Every modifying
        task must name outcome, bounded inspection, upstream reads, exact editable
        and forbidden paths, focused verification, evidence output, idempotent
        retry, and blocker behavior. Every Bash node must use an exact
        request-supplied deterministic command, unique safe output path, explicit
        cwd, and parseable exit marker; an agent must interpret every meaningful
        Bash result. Every control node must always emit one valid decision and
        use bounded restart policy and valid upstream targets. Never leave TODOs,
        placeholders, mock work, destructive cleanup, or ordinary source copies
        under run/.

        Atomically write
        .omp-swarm/author-complex-dag/run/handoffs/authoring.md with requirement
        coverage, project ownership, evidence paths, expected waves, and blockers.
        Reruns repair the current output idempotently instead of duplicating it.
      waits_for: [synthesize_design]

    validate_initial:
      type: bash
      command: |
        omp-swarm validate .omp/generated-complex-task.yaml
        status=$?
        printf '\nVALIDATION_EXIT=%s\n' "$status"
        exit "$status"
      output_path: .omp-swarm/author-complex-dag/run/reports/validation-initial.txt
      cwd: .
      waits_for: [author_dag]

    audit_traceability:
      type: agent
      role: Independent requirement and source coverage auditor
      task: |
        Read the canonical request, source packets, source coverage, project
        analysis, design, authoring report, initial validation output, and actual
        generated DAG. Inspect cited source and project files. Do not edit files.
        Verify precedence, stable requirement traceability, complete acceptance,
        and that every required behavior has a producer and an independent
        acceptance path. Reject invented scope, omitted boundaries, summary-only
        review, and uncited decisions. Atomically write PASS, actionable FINDINGS,
        or BLOCKER with exact source IDs, citations, paths, node IDs, observed and
        required behavior, and focused acceptance to
        .omp-swarm/author-complex-dag/run/reports/audit-traceability.md.
      waits_for: [validate_initial]

    audit_scheduling:
      type: agent
      role: Independent scheduling and path-safety auditor
      task: |
        Read the design, runtime contract, initial validation output, and actual
        generated DAG. Reinspect the installed skill references and available
        schema as needed. Do not edit files. Verify supported fields, workspace,
        complete explicit edges, intended waves, concurrency, one writer per
        mutable path per wave, serialized convergence paths, unique evidence
        writers, Bash failure interpretation, valid control ancestry, bounded
        rewind, and idempotence against persistent source edits. Atomically write
        PASS, actionable FINDINGS, or BLOCKER to
        .omp-swarm/author-complex-dag/run/reports/audit-scheduling.md.
      waits_for: [validate_initial]

    audit_scale_and_recovery:
      type: agent
      role: Independent large-task operability auditor
      task: |
        Read the request, design, initial validation output, and actual generated
        DAG. Do not edit files. Stress-review complete source partitioning, bounded
        agent contexts, useful fan-out and fan-in, no gratuitous symmetry, no
        writer self-approval, actual-tree review, actionable handoffs,
        deterministic evidence, correction ownership, and a recovery suffix that
        preserves settled analysis. Flag overloaded agents and fragmentation that
        adds handoffs without independent ownership or review. Require safe
        failure on missing evidence, unresolved precedence, ownership overlap, or
        acceptance work outside the declared envelope. Atomically write PASS,
        actionable FINDINGS, or BLOCKER to
        .omp-swarm/author-complex-dag/run/reports/audit-scale-and-recovery.md.
      waits_for: [validate_initial]

    repair_dag:
      type: agent
      role: Bounded generated-DAG remediation specialist
      task: |
        Read the request, analyses, design, authoring report, all three audits,
        initial validation output, and the latest final decision when present.
        Confirm every finding against current evidence and the actual generated
        DAG. Edit only .omp/generated-complex-task.yaml. Never edit project source,
        inputs, sibling-owned reports, or runtime .swarm_* paths. Fix every
        confirmed in-scope defect without widening the design's mutation envelope.
        Preserve correct content and remain idempotent across rewinds. Treat edits
        needed outside the generated DAG, missing source evidence, irreconcilable
        requirements, or request changes as blockers. Atomically write finding
        dispositions, exact fixes, requirement IDs, blockers, and focused evidence
        or explicit NO-OP to
        .omp-swarm/author-complex-dag/run/reports/repair.md.
      waits_for:
        [audit_traceability, audit_scheduling, audit_scale_and_recovery]

    validate_final:
      type: bash
      command: |
        omp-swarm validate .omp/generated-complex-task.yaml
        status=$?
        printf '\nVALIDATION_EXIT=%s\n' "$status"
        exit "$status"
      output_path: .omp-swarm/author-complex-dag/run/reports/validation-final.txt
      cwd: .
      waits_for: [repair_dag]

    semantic_acceptance:
      type: agent
      role: Independent generated-workflow semantic reviewer
      task: |
        Read the request, source evidence, design, audits, repair report, and
        actual generated DAG. Inspect actual cited source and project files. Do
        not edit files. Recheck complete source coverage, precedence and blocker
        handling, source-before-mutation ordering, exact path ownership,
        convergence-file serialization, bounded caller analysis for public
        changes, independent review, command plus semantic acceptance, and an
        idempotent correction suffix. Atomically write PASS, actionable FINDINGS,
        or BLOCKER with concrete reproduction to
        .omp-swarm/author-complex-dag/run/reports/semantic-acceptance.md.
      waits_for: [repair_dag]

    validation_acceptance:
      type: agent
      role: Swarm validation evidence reviewer
      task: |
        Read the design, repair report, final validation output, and actual
        generated DAG. Do not edit files. PASS only when the report contains
        VALIDATION_EXIT=0 and Validation: ok, printed waves match the design's
        dependency and ownership order, workspace resolves to the intended
        existing project, and no placeholder or unsafe path remains. Missing,
        malformed, stale, or non-zero evidence is FINDINGS or BLOCKER, never
        implicit success. Atomically write PASS, actionable FINDINGS, or BLOCKER
        to .omp-swarm/author-complex-dag/run/reports/validation-acceptance.md.
      waits_for: [validate_final]

    final_decision:
      type: agent
      role: Final generated-DAG acceptance controller
      task: |
        Read the request, design, repair report, semantic acceptance, validation
        acceptance, and actual generated DAG. Verify reports against current
        source. Do not edit project files. Atomically write a final disposition to
        .omp-swarm/author-complex-dag/run/reports/final-decision.md and exactly one
        .omp-swarm/author-complex-dag/run/signals/final.control.yaml decision.

        Continue only when both acceptance reports PASS, validation is current and
        zero, every request requirement is traced, and no blocker remains. For a
        confirmed defect fixable solely in .omp/generated-complex-task.yaml,
        restart repair_dag with a concrete reason. Fail for missing evidence,
        unresolved conflicts, unsafe or out-of-envelope correction, request drift,
        or exhausted correction scope. Never restart preparation, source reading,
        synthesis, or audits. Always replace both outputs atomically.
      waits_for: [semantic_acceptance, validation_acceptance]
      control:
        signal: .omp-swarm/author-complex-dag/run/signals/final.control.yaml
        allowed_restart_targets: [repair_dag]
